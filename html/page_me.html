   <script id="aj_script">
(function(){
  function getWalletAddr(){
    try {
      if(window.Aj&&Aj.globalState&&Aj.globalState.tonConnectUI){
        var w=Aj.globalState.tonConnectUI.wallet;
        if(w&&w.account&&w.account.address) return w.account.address;
      }
    }catch(e){}
    try {
      var keys=Object.keys(localStorage);
      for(var i=0;i<keys.length;i++){
        var k=keys[i];
        if(k.indexOf('ton')!==-1||k.indexOf('wallet')!==-1||k.indexOf('Wallet')!==-1){
          try{
            var v=JSON.parse(localStorage.getItem(k));
            if(v&&v.account&&v.account.address) return v.account.address;
            if(v&&v.address) return v.address;
          }catch(e){}
        }
      }
    }catch(e){}
    return null;
  }
  function applyWalletState(){
    var addr=getWalletAddr();
    var $conn=document.getElementById('me-wallet-connected');
    var $notConn=document.getElementById('me-wallet-not-connected');
    if(addr){
      var head=addr.slice(0,Math.min(24,addr.length));
      var tail=addr.length>24?addr.slice(-Math.min(24,addr.length-24)):'';
      document.getElementById('me-wallet-addr-display').innerHTML=
        '<span class="tm-wallet"><span class="head">'+head+'</span><span class="middle"></span>'+(tail?'<span class="tail">'+tail+'</span>':'')+'</span>';
      $conn.style.display='block';
      $notConn.style.display='none';
    } else {
      $conn.style.display='none';
      $notConn.style.display='block';
    }
  }
  applyWalletState();
  document.addEventListener('ton-connect-status-change',applyWalletState);
  setTimeout(applyWalletState,800);
})();
   </script>
